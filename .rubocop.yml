inherit_gem:
  rubocop-lts: rubocop-lts.yml

# Metrics cops are disabled in Standard by default
Metrics:
  Enabled: true

# Ruby specific customizations
Layout/LineLength:
  Max: 120

Style/HashSyntax:
  EnforcedStyle: ruby19_no_mixed_keys

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma
  Enabled: true
inherit_from:
  - config/ruby-1.8.yml
  - .rubocop_rspec.yml
plugins:
  - rubocop-on-rbs
  - rubocop-packaging
# This tells RuboCop to add the exclusions in this file
# to the default exclusions (and those from other inherited files),
# rather than overwriting them.
inherit_mode:
  merge:
    - Exclude
AllCops:
  # We use the rubocop-lts gem version (v24) for Ruby 3.2, but loading the
  # oldest internal config above would otherwise lower TargetRubyVersion.
  Exclude:
    - certs/**/*
    - checksums/**/*
    - docs/**/*
    - examples/**/*
    - fixtures/**/*
    - gemfiles/*.gemfile
    - pkg/**/*
    - results/**/*
    - spec/fixtures/**/*
    - tmp/**/*
    - vendor/**/*
    - AGENTS.md
RBS:
  Enabled: true
Layout/IndentationConsistency:
  Exclude: ['*.md']
